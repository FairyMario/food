<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>生成PWA图标</title>
<style>
body{font-family:sans-serif;text-align:center;padding:20px;background:#1a1a2e;color:#fff}
button{padding:14px 30px;margin:10px;font-size:18px;border:none;border-radius:12px;cursor:pointer;background:#e74c3c;color:#fff}
canvas{display:none}
.preview{margin:20px;border-radius:24px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.done{color:#5cdb5c;font-weight:bold}
</style></head><body>
<h1>🍜 吃遍郑州 — PWA图标生成器</h1>
<p>点击按钮下载图标，放到 images/ 文件夹</p>
<canvas id="c" width="512" height="512"></canvas><br>
<img id="p192" class="preview"><br>
<img id="p512" class="preview"><br>
<button onclick="gen(192)">⬇️ 下载 192x192</button>
<button onclick="gen(512)">⬇️ 下载 512x512</button>
<div id="msg"></div>
<script>
function draw(size) {
    var c = document.getElementById('c');
    c.width = size; c.height = size;
    var ctx = c.getContext('2d');
    var s = size, r = s * 0.22;
    // 背景渐变
    var g = ctx.createLinearGradient(0, 0, s, s);
    g.addColorStop(0, '#e74c3c');
    g.addColorStop(1, '#c0392b');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(s-r,0); ctx.quadraticCurveTo(s,0,s,r);
    ctx.lineTo(s,s-r); ctx.quadraticCurveTo(s,s,s-r,s);
    ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r);
    ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath(); ctx.fill();
    // 🍜 简化图案
    var cx = s/2, cy = s*0.52;
    var bw = s*0.4, bh = s*0.32;
    // 碗的渐变
    var bg = ctx.createLinearGradient(cx-bw, cy-bh, cx+bw, cy+bh);
    bg.addColorStop(0, '#ffffff');
    bg.addColorStop(1, '#f0e0d0');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(cx, cy, bw, bh*0.55, 0, Math.PI, 0);
    ctx.fill();
    // 碗边
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = s*0.055;
    ctx.beginPath();
    ctx.ellipse(cx, cy-bh*0.1, bw, bh*0.22, 0, 0, Math.PI*2);
    ctx.stroke();
    // 三道热气
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = s*0.025;
    ctx.lineCap = 'round';
    for (var i=-1;i<=1;i++) {
        ctx.beginPath();
        var sx = cx + i*s*0.1;
        var sy = cy - bh*0.35;
        ctx.moveTo(sx, sy);
        ctx.quadraticCurveTo(sx+s*0.04, sy-s*0.12, sx, sy-s*0.2);
        ctx.stroke();
    }
    // 碗内小圆点
    ctx.fillStyle = '#f5a623';
    ctx.beginPath(); ctx.arc(cx - s*0.05, cy + s*0.01, s*0.03, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + s*0.08, cy - s*0.03, s*0.025, 0, Math.PI*2); ctx.fill();
}

function gen(size) {
    draw(size);
    var c = document.getElementById('c');
    var a = document.createElement('a');
    a.download = 'icon-' + size + '.png';
    a.href = c.toDataURL('image/png');
    a.click();
    document.getElementById('p' + size).src = a.href;
    document.getElementById('msg').innerHTML = '<span class="done">✅ icon-' + size + '.png 已下载！</span>';
}

// 预览
draw(192);
document.getElementById('p192').src = document.getElementById('c').toDataURL();
draw(512);
document.getElementById('p512').src = document.getElementById('c').toDataURL();
</script>
</body></html>
